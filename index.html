<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 PC SHOWROOM ADANA</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; padding: 0; color: #333;
        }
        
        .header { 
            background-color: #2c3e50; color: white; padding: 20px 15px 80px 15px; 
            text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .contact-info {
            display: flex; align-items: center; gap: 10px; background-color: rgba(255, 255, 255, 0.1); 
            padding: 10px 20px; border-radius: 30px; font-size: 1.1rem; text-decoration: none; 
            color: white; transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hardware-hero-container {
            width: 100%; max-width: 850px; margin: -70px auto 20px auto; 
            padding: 0 15px; box-sizing: border-box; display: flex; justify-content: center; position: relative; z-index: 10;
        }
        .hardware-hero-container img { width: 100%; height: auto; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }

        .services-bar {
            background: white; max-width: 900px; margin: 10px auto 30px auto; padding: 20px;
            border-radius: 15px; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1e4e8;
        }

        .service-item { font-size: 1rem; color: #2c3e50; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .container { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        
        .card { 
            background: white; border-radius: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); 
            width: 320px; overflow: hidden; display: flex; flex-direction: column; position: relative;
            transition: all 0.3s ease; border: 1px solid #eee;
        }

        /* Satıldı Etiketi */
        .sold-badge {
            position: absolute; top: 15px; right: -35px; background: #e74c3c; color: white;
            padding: 5px 40px; transform: rotate(45deg); font-weight: bold; font-size: 0.9rem;
            z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sold-overlay { filter: grayscale(0.8) opacity(0.7); }

        .gallery-container { position: relative; width: 100%; height: 220px; background: #f8f9fa; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(255,255,255,0.9); border: none; width: 35px; height: 35px; 
            cursor: pointer; border-radius: 50%; display: none; font-weight: bold;
        }
        .gallery-container:hover .nav-btn { display: block; }
        .prev { left: 10px; } .next { right: 10px; }

        .content { padding: 20px; flex-grow: 1; }
        .title { font-size: 1.25rem; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .specs { font-size: 0.9rem; color: #555; line-height: 1.5; }
        
        .footer { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background-color: #fcfcfc; border-top: 1px solid #f0f0f0; }
        .price { font-size: 1.4rem; color: #2ecc71; font-weight: 800; }
        .btn { background: #3498db; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        .sold-btn { background: #95a5a6 !important; cursor: not-allowed; }

        @media (max-width: 600px) { .card { width: 90%; } }
    </style>
</head>
<body>

<div class="header">
    <h1>💻 PC SHOWROOM ADANA</h1>
    <a href="https://wa.me/905368873931" target="_blank" class="contact-info">
        <span>📞 İletişim: 0536 887 39 31</span>
    </a>
</div>

<div class="hardware-hero-container">
    <img src="resim/donanim.png" alt="Donanım Görseli">
</div>

<div class="services-bar">
    <div class="service-item">🛠️ Bakım & Onarım</div>
    <div class="service-item">🚀 Yükseltme</div>
    <div class="service-item">🧼 Temizlik</div>
    <div class="service-item">⚙️ Parça Değişimi</div>
</div>

<div class="container" id="urun-listesi"></div>

<script>
    async function urunleriGetir() {
        try {
            const response = await fetch('urunler.json');
            const urunler = await response.json();
            const liste = document.getElementById('urun-listesi');

            urunler.forEach((urun, index) => {
                // EĞER JSON'DA DURUM "sil" İSE BU ÜRÜNÜ HİÇ GÖSTERME
                if(urun.durum === "sil") return;

                const isSold = urun.durum === "satildi";
                const card = document.createElement('div');
                card.className = `card ${isSold ? 'sold-card' : ''}`;
                
                card.innerHTML = `
                    ${isSold ? '<div class="sold-badge">SATILDI</div>' : ''}
                    <div class="gallery-container ${isSold ? 'sold-overlay' : ''}">
                        <img id="img-${index}" src="${urun.resimler[0]}" class="gallery-img">
                        ${urun.resimler.length > 1 ? `
                            <button class="nav-btn prev" onclick="changeImg(${index}, -1, ${JSON.stringify(urun.resimler).replace(/"/g, '&quot;')})">❮</button>
                            <button class="nav-btn next" onclick="changeImg(${index}, 1, ${JSON.stringify(urun.resimler).replace(/"/g, '&quot;')})">❯</button>
                        ` : ''}
                    </div>
                    <div class="content">
                        <div class="title">${urun.baslik}</div>
                        <p class="specs">${urun.ozellikler}</p>
                    </div>
                    <div class="footer">
                        <div class="price">${isSold ? '---' : urun.fiyat}</div>
                        <a href="${isSold ? '#' : urun.link}" class="btn ${isSold ? 'sold-btn' : ''}">
                            ${isSold ? 'Satıldı' : 'İncele / İlan'}
                        </a>
                    </div>
                `;
                liste.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }

    function changeImg(cardIdx, direction, resimler) {
        const imgTag = document.getElementById(`img-${cardIdx}`);
        let index = resimler.indexOf(imgTag.getAttribute('src'));
        index = (index + direction + resimler.length) % resimler.length;
        imgTag.src = resimler[index];
    }
    window.onload = urunleriGetir;
</script>
</body>
</html>
