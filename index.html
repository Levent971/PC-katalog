<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 PC SHOWROOM ADANA</title>
    <style>
        /* Genel Stiller - Tamamen Mavi Tonlarda Arka Plan */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #d1dbe5; /* Beyazdan tamamen çıkıldı, mat mavi tonu */
            margin: 0; 
            padding: 0; 
            color: #333;
        }
        
        /* Genişletilmiş Başlık Alanı (Lacivert Bölüm) */
        .header-hero { 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 20;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        /* Sol Taraf: Donanım Görseli */
        .hero-image {
            flex: 0 0 350px;
            display: flex;
            justify-content: center;
        }
        .hero-image img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Sağ Taraf: İsim ve İletişim */
        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero-text h1 {
            margin: 0 0 15px 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.1); 
            padding: 10px 20px; 
            border-radius: 30px;
            font-size: 1.1rem;
            text-decoration: none; 
            color: white; 
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .contact-box:hover { background-color: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* Alt Şerit: Hizmetler (Lacivert İçinde) */
        .services-strip {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .service-tag {
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Ürün Listesi Bölümü */
        .container { 
            max-width: 1200px;
            margin: 40px auto;
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding: 0 20px;
        }
        
        /* Kart Tasarımı */
        .card { 
            background: rgba(255, 255, 255, 0.9); /* Hafif şeffaf mat beyaz */
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            width: 280px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        
        .gallery-container { position: relative; width: 100%; height: 180px; background: #eee; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; }
        
        .sold-badge {
            position: absolute; top: 10px; right: -25px; background: #e74c3c; color: white;
            padding: 5px 30px; transform: rotate(45deg); font-weight: bold; font-size: 0.7rem;
            z-index: 5;
        }
        .sold-overlay { filter: grayscale(1) opacity(0.6); }

        .content { padding: 15px; flex-grow: 1; }
        .title { font-size: 1.1rem; font-weight: 700; color: #2c3e50; margin-bottom: 6px; }
        .specs { font-size: 0.8rem; color: #555; line-height: 1.4; }
        
        .footer { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background-color: rgba(0,0,0,0.02); }
        .price { font-size: 1.2rem; color: #27ae60; font-weight: 800; }
        .btn { background: #3498db; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        .sold-btn { background: #7f8c8d !important; cursor: not-allowed; }

        /* Mobil Ayarlar */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; text-align: center; }
            .hero-image { flex: none; width: 200px; }
            .hero-text h1 { font-size: 1.6rem; }
            .services-strip { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header-hero">
    <div class="header-content">
        <div class="hero-image">
            <img src="resim/donanim.png" alt="Donanım">
        </div>

        <div class="hero-text">
            <h1>💻 PC SHOWROOM ADANA</h1>
            <a href="https://wa.me/905368873931" target="_blank" class="contact-box">
                <span>📞 İletişim: 0536 887 39 31</span>
            </a>
            
            <div class="services-strip">
                <span class="service-tag">🛠️ Bakım & Onarım</span>
                <span class="service-tag">🚀 Yükseltme</span>
                <span class="service-tag">🧼 Temizlik</span>
                <span class="service-tag">⚙️ Parça Değişimi</span>
            </div>
        </div>
    </div>
</div>

<div class="container" id="urun-listesi">
    </div>

<script>
    async function urunleriGetir() {
        try {
            const response = await fetch('urunler.json');
            const urunler = await response.json();
            const liste = document.getElementById('urun-listesi');

            urunler.forEach((urun, index) => {
                if(urun.durum === "sil") return;

                const isSold = urun.durum === "satildi";
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    ${isSold ? '<div class="sold-badge">SATILDI</div>' : ''}
                    <div class="gallery-container ${isSold ? 'sold-overlay' : ''}">
                        <img id="img-${index}" src="${urun.resimler[0]}" class="gallery-img">
                    </div>
                    <div class="content">
                        <div class="title">${urun.baslik}</div>
                        <p class="specs">${urun.ozellikler}</p>
                    </div>
                    <div class="footer">
                        <div class="price">${isSold ? '---' : urun.fiyat}</div>
                        <a href="${isSold ? '#' : urun.link}" class="btn ${isSold ? 'sold-btn' : ''}">
                            ${isSold ? 'Satıldı' : 'İncele / İlan'}
                        </a>
                    </div>
                `;
                liste.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }
    window.onload = urunleriGetir;
</script>

</body>
</html>
