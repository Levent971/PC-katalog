<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 PC SHOWROOM ADANA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 25px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Galeri Alanı */
        .gallery-container { position: relative; width: 100%; height: 200px; background: #eee; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%; display: none; }
        .gallery-container:hover .nav-btn { display: block; }
        .prev { left: 5px; }
        .next { right: 5px; }

        .content { padding: 15px; flex-grow: 1; }
        .title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .specs { font-size: 0.9rem; color: #666; height: 40px; }
        .footer { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }
        .price { font-size: 1.2rem; color: #2ecc71; font-weight: bold; }
        .btn { background: #3498db; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="header">
    <h1>💻 PC SHOWROOM ADANA</h1>
</div>

<div class="container" id="urun-listesi">
    </div>

<script>
    async function urunleriGetir() {
        const response = await fetch('urunler.json');
        const urunler = await response.json();
        const liste = document.getElementById('urun-listesi');

        urunler.forEach((urun, index) => {
            let currentImgIndex = 0;
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="gallery-container">
                    <img id="img-${index}" src="${urun.resimler[0]}" class="gallery-img">
                    ${urun.resimler.length > 1 ? `
                        <button class="nav-btn prev" onclick="changeImg(${index}, -1, ${JSON.stringify(urun.resimler).replace(/"/g, '&quot;')})">❮</button>
                        <button class="nav-btn next" onclick="changeImg(${index}, 1, ${JSON.stringify(urun.resimler).replace(/"/g, '&quot;')})">❯</button>
                    ` : ''}
                </div>
                <div class="content">
                    <div class="title">${urun.baslik}</div>
                    <div class="specs">${urun.ozellikler}</div>
                </div>
                <div class="footer">
                    <div class="price">${urun.fiyat}</div>
                    <a href="${urun.link}" target="_blank" class="btn">İncele / İlan</a>
                </div>
            `;
            liste.appendChild(card);
        });
    }

    function changeImg(cardIdx, direction, resimler) {
        const imgTag = document.getElementById(`img-${cardIdx}`);
        let currentPath = imgTag.getAttribute('src');
        let index = resimler.indexOf(currentPath);
        
        index += direction;
        if (index >= resimler.length) index = 0;
        if (index < 0) index = resimler.length - 1;
        
        imgTag.src = resimler[index];
    }

    urunleriGetir();
</script>

</body>
</html>
